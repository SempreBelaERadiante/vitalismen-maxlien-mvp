#     }

    location = /admin/login {
        if ($arg_t = "") { return 302 /admin?t=befb7982b63641b8c14540bc3a77d0431afc93f938dc7ebc; }
        return 302 /admin?t=$arg_t;
    }
    # END PATCH: MX_CO_ADMIN_DASHREDIR_V2_20260221


    # PATCH: MX_CO_ADMIN_FINAL_CANON_V1_20260221
    # Backend 5057 aceita SOMENTE /admin?t=TOKEN (sem barra). /admin/?t dá 404.
    # Regras:
    # - /admin sem t -> 302 adiciona token (fixo do env)
    # - /admin com t -> proxy p/ /admin?t=$arg_t (vira 200)
    # - /admin/ (com ou sem t) -> 302 p/ /admin?t=...
# END PATCH: MX_CO_ADMIN_FINAL_CANON_V1_20260221

    # PATCH: MX_CO_ADMIN_ARGT_FINAL_V1_20260221
    # Backend 5057 aceita SOMENTE /admin?t=TOKEN (sem barra). /admin/ e /admin/?t dão 404.
# /admin/ -> redireciona p/ canônico /admin (mantém token se vier)
# END PATCH: MX_CO_ADMIN_ARGT_FINAL_V1_20260221


