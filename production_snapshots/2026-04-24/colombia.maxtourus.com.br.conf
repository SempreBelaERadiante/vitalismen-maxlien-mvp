# PATCH: MX_CO_VHOST_MIN_V1_20260220_233814
# colombia.maxtourus.com.br — HTTPS static + expose /api/lead -> 5055
# Safe: does NOT touch EC.

server {
    if ($host = colombia.maxtourus.com.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name colombia.maxtourus.com.br;


    

    # PATCH: MX_CO_HEALTH_PROXY_V1_20260221
    location = /health {
        # PATCH: MX_CO_HEALTH_FILE_PLAIN_V1_20260221
        default_type text/plain;
        types { }
        try_files /health.txt =404;
    }
# PATCH: MX_CO_ADMIN_ARGT_PROXY_V5SAFE_20260221
location = /admin/ {

        if ($arg_t = "") { return 302 /admin?t=befb7982b63641b8c14540bc3a77d0431afc93f938dc7ebc; }

        return 302 /admin?t=$arg_t;

    }

    # END PATCH: MX_CO_ADMIN_ARGT_PROXY_V5SAFE_20260221

      # PATCH: MX_ADMIN_SLASH_REDIRECT_SAFE_V1
# PATCH: MX_ADMIN_EXACT_PROXY_MIN_V1_20260221
# END PATCH: MX_ADMIN_EXACT_PROXY_MIN_V1_20260221

      # END PATCH: MX_ADMIN_SLASH_REDIRECT_SAFE_V1


    # PATCH: MX_ADMIN_EXACT_PROXY_CO_V1
    # Garante /admin/login e /admin/dashboard indo pro backend (location = ganha de tudo)
    location = /admin/login {
        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /admin/dashboard {
        # PATCH: MX_CO_ADMIN_FIX_CSV_DASH_V1_20260222 (replaced proxy_pass)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PATCH: MX_CO_ADMIN_FIX_CSV_DASH_V1_20260222
        proxy_pass http://127.0.0.1:5057;
    }

    # END PATCH: MX_ADMIN_EXACT_PROXY_CO_V1

    # PATCH: MX_ADMIN_PROXY_ONLY_CO_V1
    # Modo B: SEM Basic Auth — apenas roteia /admin* para o backend
location ^~ /treino/admin/ {
        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # END PATCH: MX_ADMIN_PROXY_ONLY_CO_V1

location ^~ /.well-known/acme-challenge/ {
        root /var/www/colombia.maxtourus.com.br;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
    # PATCH: MX_FORCE_AUTH_OFF_CO_V1
    # Modo B: desliga Basic Auth (garante mesmo com includes)
    # MX_CO_DEDUP_AUTH_BASIC_OFF_V1_20260223 (disabled duplicate) auth_basic off;    # END PATCH: MX_FORCE_AUTH_OFF_CO_V1



    # MX_CO_ADMIN_FIX_EDIT403_V1_20260223
    # Admin panel: allow /admin and all subroutes (/admin/*) via upstream 5057
    location = /admin {
        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MX-ADMIN-PROXY admin_exact_5057 always;
    }

    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-MX-ADMIN-PROXY admin_prefix_5057 always;
    }

}



server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name colombia.maxtourus.com.br;

    # MX_CO_SPLIT_MOBILE_V1_20260222
    location ^~ /vital-core/ {
        # MX_CO_SPLIT_MOBILE_FORCE_UA_V1_20260222
        # allow-list: somente mobile. todo o resto = 403.
        try_files $uri $uri/ =404;
    }


    # MX_CO_ADMIN_PROXY5057_FORCE_V1_20260222
    # MX_CO_ADMIN_PROXY5057_FORCE_V1_20260222
    # MX_CO_ADMIN_CANON_NOSLASH_V2_20260222
    # Canon: /admin/ -> /admin (Flask strict_slashes)
    location = /admin/ {
        add_header X-MX-ADMIN-PROXY "admin_strip_slash" always;
        return 301 /admin$is_args$args;
    }

    # /admin (SEM barra) vai direto ao app
    location = /admin {
        add_header X-MX-ADMIN-PROXY "admin_exact_5057" always;

        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
    location ^~ /admin/ {
        add_header X-MX-ADMIN-PROXY "admin_proxy_5057" always;

        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

# PATCH: MX_CO_ADMIN_GUARD3_V1_20260222 (insert)
# END PATCH: MX_CO_ADMIN_GUARD3_V1_20260222


    # PATCH: MX_CO_ADMIN_NO302_V1_20260222 (proxy direto sem 302)

