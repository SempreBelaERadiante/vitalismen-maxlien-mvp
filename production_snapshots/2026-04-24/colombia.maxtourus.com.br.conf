    # PATCH: MX_ADMIN_PROXY_ONLY_CO_V1
    # Modo B: SEM Basic Auth — apenas roteia /admin* para o backend
location ^~ /treino/admin/ {
        proxy_pass http://127.0.0.1:5057;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # END PATCH: MX_ADMIN_PROXY_ONLY_CO_V1

add_header X-MX-CO-VHOST "MX_CO_VHOST_DEBUG_20260220_234223" always;

    root /var/www/colombia.maxtourus.com.br;
    index index.html;
    ssl_certificate /etc/letsencrypt/live/colombia.maxtourus.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/colombia.maxtourus.com.br/privkey.pem; # managed by Certbot

    access_log /var/log/nginx/colombia.maxtourus.com.br.access.log;
    error_log  /var/log/nginx/colombia.maxtourus.com.br.error.log;

    # === API LEAD (igual padrão do EC) ===
    # === API LEAD (CO) ===
    location = /api/lead {
        add_header X-MX-CO-API "MX_CO_API_LEAD_20260220_234702" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=maxtourus_lead burst=20 nodelay;

        proxy_pass http://127.0.0.1:5057/api/lead;
        client_max_body_size 2m;
    }

    # barra no fim + subpaths
    location ^~ /api/lead/ {
        add_header X-MX-CO-API "MX_CO_API_LEAD_20260220_234702" always;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5057/api/lead;
        client_max_body_size 2m;
    }

    # === Static SPA ===
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PATCH: MX_FORCE_AUTH_OFF_CO_V1
    # Modo B: desliga Basic Auth (garante mesmo com includes)
    auth_basic off;
    # END PATCH: MX_FORCE_AUTH_OFF_CO_V1


