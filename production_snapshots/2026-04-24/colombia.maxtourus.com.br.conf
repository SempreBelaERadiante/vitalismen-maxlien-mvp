    # PATCH: MX_CO_ADMIN_CANON_UNIQUE_V6_20260221
    # Regras canônicas:
    # - /admin sem t -> 302 /admin?t=TOKEN_FIXO
    # - /admin com t -> proxy pro backend (preservando query original)
    # - /admin/ (com ou sem t) -> 302 /admin?t=...
    # - /admin/* -> proxy pro backend (dashboard/login/etc)
    # PATCH: MX_CO_HEALTH_PROXY_IN_443_V1_20260221
    location = /health {
        proxy_pass http://127.0.0.1:5057/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

