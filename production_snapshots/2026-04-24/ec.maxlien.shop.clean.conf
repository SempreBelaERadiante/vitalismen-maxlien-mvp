server {
    listen 80;
    listen [::]:80;
    server_name ec.maxlien.shop;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/ec.maxlien.shop;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ec.maxlien.shop;
    root /var/www/ec.maxlien.shop;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/ec.maxlien.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ec.maxlien.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/ec.maxlien.shop;
        default_type text/plain;
        try_files $uri =404;
    }

    location = /admin {
        proxy_pass http://127.0.0.1:5055/admin/dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Remote-User admin;
    }

    location ^~ /admin/ {
        proxy_pass http://127.0.0.1:5055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Remote-User admin;
    }

    location ^~ /api/lead {
        proxy_pass http://127.0.0.1:5055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
