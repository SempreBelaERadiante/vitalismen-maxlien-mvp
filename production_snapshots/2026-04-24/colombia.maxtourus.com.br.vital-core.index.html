  function qparams(){
    var p = new URLSearchParams(location.search || "");

    ["utm_source","utm_medium","utm_campaign","utm_content","utm_term","fbclid"].forEach(function(k){

  function getCookie(name){
    var m = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([.0*|{}()\[\]\\\/\+^])/g,"\") + "=([^;]*)"));

  function mkEventId(){

  var o = qparams();

  window.__MAXLIEN_ORIGIN = o;
})();

  <script>
  /* =============================
     CONFIGURACION - COLOMBIA
  ============================= */
  const CO_PREFIX = "57";

  /* TROQUE AQUI:
     se vendedor é 0991234567 => coloque "991234567" (sem 0 inicial) */
  const SELLER_CO_LOCAL = "3001234567";

  /* Backend (opcional): se estiver 404, não quebra WhatsApp */
  const API_LEAD_URL = "/api/lead";

  /* Formulário só no final do vídeo (produção)
   40:00 = 2400 segundos
*/
const SHOW_FORM_AFTER_SECONDS = 2400;


  /* Preços */
  const PRICE_MAP = { 1: 170000, 2: 300000, 3: 350000, 6: 584000 };

  function digits(s){ return (s||"").replace(/\D/g,""); }

  function normalizeClientPhone(raw){
    let p = digits(raw);
    if (p.startsWith("57")) p = p.slice(2);
    if (p.startsWith("0")) p = p.slice(1);
    return CO_PREFIX + p;
  }

  function sellerE164(){
    let p = digits(SELLER_CO_LOCAL).replace(/^0+/,"");
    return CO_PREFIX + p;
  }

  function waUrl(msg){
    return "https://wa.me/" + sellerE164() + "?text=" + encodeURIComponent(msg);
  }

  /* Badge (hash + timestamp) */
  (function(){
    const ts = new Date();
    const pad=n=>String(n).padStart(2,'0');
    const stamp = ts.getFullYear()+'.'+pad(ts.getMonth()+1)+'.'+pad(ts.getDate())+' '+
                  pad(ts.getHours())+':'+pad(ts.getMinutes())+':'+pad(ts.getSeconds());
    const html = document.documentElement.outerHTML;
    let h=0; for(let i=0;i<html.length;i++){ h=((h<<5)-h)+html.charCodeAt(i); h|=0; }
    const hash = (h>>>0).toString(16).slice(0,8);
    document.getElementById('vb-hash').textContent = hash;
    document.getElementById('vb-ts').textContent = stamp;
  })();

  /* Mostrar formulário no final (timer absoluto) */
  const START_KEY = "co_vsl_start_ts_prod_v1";

  function showForm(){
    const box = document.getElementById("orderForm");
    if(box) box.style.display = "block";
  }

  (function scheduleShow(){
    let startTs = parseInt(localStorage.getItem(START_KEY) || "0", 10);
    if(!startTs){
      startTs = Date.now();
      localStorage.setItem(START_KEY, String(startTs));
    }
    const elapsedSec = Math.floor((Date.now() - startTs) / 1000);
    const remainingSec = SHOW_FORM_AFTER_SECONDS - elapsedSec;

    if(remainingSec <= 0) showForm();
    else setTimeout(showForm, remainingSec * 1000);
  })();

/* Submit: dispara Lead + Purchase (uma vez), registra (opcional) e abre WhatsApp */
document.getElementById("leadForm").addEventListener("submit", function(e){
  e.preventDefault();

  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.textContent = "Abriendo WhatsApp...";

  const form = e.target;
  const qty = parseInt(form.product_qty.value, 10);
  const productValue = PRICE_MAP[qty] || 39.99;

  const payload = {
    name: (form.name.value || "").trim(),
    phone: normalizeClientPhone(form.phone.value),
    province: (form.province.value || "").trim(),
    city: (form.city.value || "").trim(),
    address: (form.address.value || "").trim(),
    product_qty: qty,
    product_value: productValue,
    country: "CO",
    whatsapp_optin: 1
  };

  // Mensagem do WhatsApp (precisa existir antes de goWA)
  const msg =
    "Hola, quiero ordenar.\n\n" +
    "Nombre: " + payload.name + "\n" +
    "Teléfono: +" + payload.phone + "\n" +
    "Provincia: " + payload.province + "\n" +
    "Ciudad: " + payload.city + "\n" +
    "Dirección: " + payload.address + "\n" +
    "Cantidad: " + payload.product_qty + "\n" +
    "Total: COP " + payload.product_value + "\n";

  // === DEDUP_LEAD_EVENTID_EC_V1 ===

  // nunca travar o fluxo
  let redirected = false;
  function goWA(){
    if (redirected) return;
    redirected = true;
    window.location.href = waUrl(msg);
  }
  setTimeout(goWA, 1200);

  // registra lead e usa event_id para dedup
  try{
    fetch(API_LEAD_URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(Object.assign({}, payload, (window.__MAXLIEN_ORIGIN || {})))
    })
    .then(r => r.json())
    .then(j => {
      const eventId = j && j.event_id ? String(j.event_id) : null;
      const waUrlFromServer = j && j.wa_url ? String(j.wa_url) : "";

      // Lead com dedup
      try {
        if (window.fbq && eventId) {
          fbq('track', 'Lead', {}, { eventID: eventId });
        }
      } catch(e) {}

      // mantém wrappers existentes
      try { if (window.__mvpMarkLeadOnce) window.__mvpMarkLeadOnce(eventId); } catch(e) {}
      try { if (window.__mvpMarkPurchaseOnce) window.__mvpMarkPurchaseOnce(productValue); } catch(e) {}

      if (waUrlFromServer) {
        redirected = true;
        window.location.href = waUrlFromServer;
        return;
      }

      goWA();
    })
    .catch(() => goWA());
  }catch(err){
    goWA();
  }
});
</script>
